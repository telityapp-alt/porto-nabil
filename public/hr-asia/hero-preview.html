<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Asia Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #7A8448 0%, #2E4A3C 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px;
        }
        .hero-card {
            background: rgba(242, 237, 224, 0.98);
            border: 2px solid rgba(217, 209, 194, 0.6);
            border-radius: 24px;
            padding: 60px 80px;
            max-width: 1000px;
            box-shadow: 0 20px 60px rgba(21, 19, 16, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        .eyebrow {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7A8448;
            margin-bottom: 16px;
        }
        .title {
            font-family: 'Lora', serif;
            font-size: 56px;
            font-weight: 600;
            color: #2B2719;
            line-height: 1.15;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 20px;
            line-height: 1.6;
            color: rgba(43, 39, 25, 0.75);
            margin-bottom: 40px;
            max-width: 700px;
        }
        .stats {
            display: flex;
            gap: 48px;
            padding-top: 32px;
            border-top: 2px solid rgba(217, 209, 194, 0.5);
        }
        .stat-item {
            flex: 1;
        }
        .stat-value {
            font-family: 'Lora', serif;
            font-size: 42px;
            font-weight: 600;
            color: #2E4A3C;
            margin-bottom: 6px;
        }
        .stat-label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(43, 39, 25, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge {
            display: inline-block;
            background: #D4AE52;
            color: #2B2719;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="hero-card">
        <div class="badge">HR Intelligence Platform</div>
        <div class="eyebrow">Asia-Pacific</div>
        <div class="title">Everything HR across Asia, in one place</div>
        <div class="subtitle">Labor law for 6 countries. Ready-to-use templates. Weekly intelligence briefs. Free tools that answer in seconds. Whatever HR question you have in Asia, the answer starts here.</div>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value">15%</div>
                <div class="stat-label">Lead Conversion</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">6</div>
                <div class="stat-label">Countries</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">18</div>
                <div class="stat-label">Templates</div>
            </div>
        </div>
    </div>
</body>
</html>
